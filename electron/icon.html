<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 64px; height: 64px;
      background: transparent;
      overflow: hidden;
    }
    .icon {
      width: 60px; height: 60px;
      margin: 2px;
      border-radius: 50%;
      cursor: pointer;
      overflow: hidden;
      border: 2px solid rgba(201, 168, 76, 0.35);
      box-shadow: 0 2px 14px rgba(196, 32, 64, 0.35), 0 0 0 1px rgba(0,0,0,0.4);
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      background: linear-gradient(145deg, #0d1a3e, #2a0d4a, #5a0f20);
    }
    .icon:hover {
      border-color: rgba(201, 168, 76, 0.8);
      box-shadow: 0 4px 22px rgba(196, 32, 64, 0.65), 0 0 0 1px rgba(0,0,0,0.5);
      transform: scale(1.05);
    }
    .icon:active { transform: scale(0.97); }
    .icon.pulsing { animation: iconPulse 1.1s ease-in-out infinite; }
    .icon img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top right;
    }
    /* Fallback when no image */
    .icon .fallback {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 2px 14px rgba(196, 32, 64, 0.35); border-color: rgba(201, 168, 76, 0.35); }
      50%       { box-shadow: 0 4px 28px rgba(196, 32, 64, 0.9);  border-color: rgba(196, 32, 64, 0.9); }
    }
  </style>
</head>
<body>
  <div class="icon" id="icon" onclick="window.overlay.toggleChat()">
    <img
      src="../public/minthara.jpg"
      alt="M"
      onerror="this.style.display='none'; document.querySelector('.fallback').style.display='flex'"
    >
    <div class="fallback" style="display:none">⚔️</div>
  </div>

  <script>
    // Listen for pulse signal from main process (when loading)
    window.overlay.onPulse(active => {
      document.getElementById('icon').classList.toggle('pulsing', active)
    })
  </script>
</body>
</html>
